syntax = "proto3";

package syncvault.v1.health;

option go_package = "syncvault/internal/grpc/proto/health;healthv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// HealthService предоставляет стандартные health check endpoints
// Совместим с grpc.health.v1 Health Checking Protocol
service HealthService {
  // Стандартный health check (grpc.health.v1.Health.Check)
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
  
  // Streaming health check (grpc.health.v1.Health.Watch)
  rpc Watch(HealthCheckRequest) returns (stream HealthCheckResponse);
  
  // Расширенный health check с детальной информацией
  rpc DetailedHealth(DetailedHealthRequest) returns (DetailedHealthResponse);
  
  // Health check для конкретного сервиса
  rpc ServiceHealth(ServiceHealthRequest) returns (ServiceHealthResponse);
  
  // Health check для всех сервисов
  rpc AllServicesHealth(google.protobuf.Empty) returns (AllServicesHealthResponse);
  
  // Health check для зависимостей
  rpc DependencyHealth(DependencyHealthRequest) returns (DependencyHealthResponse);
  
  // Health check для системы
  rpc SystemHealth(SystemHealthRequest) returns (SystemHealthResponse);
  
  // Live check (для Kubernetes LivenessProbe)
  rpc Live(google.protobuf.Empty) returns (LiveResponse);
  
  // Ready check (для Kubernetes ReadinessProbe)
  rpc Ready(google.protobuf.Empty) returns (ReadyResponse);
  
  // Startup check (для Kubernetes StartupProbe)
  rpc Startup(google.protobuf.Empty) returns (StartupResponse);
}

// Стандартные сообщения из grpc.health.v1

// HealthCheckRequest запрос на проверку здоровья
message HealthCheckRequest {
  string service = 1;  // Имя сервиса для проверки
}

// HealthCheckResponse ответ на проверку здоровья
message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;  // Используется только для Watch
  }
  
  ServingStatus status = 1;
}

// Расширенные сообщения для SyncVault

// DetailedHealthRequest запрос на детальную проверку здоровья
message DetailedHealthRequest {
  string service = 1;
  bool include_dependencies = 2;
  bool include_metrics = 3;
  bool include_logs = 4;
  int32 log_lines = 5;
  repeated string checks = 6;
  google.protobuf.Timestamp since = 7;
}

// DetailedHealthResponse ответ с детальной информацией о здоровье
message DetailedHealthResponse {
  string service = 1;
  HealthCheckResponse.ServingStatus status = 2;
  google.protobuf.Timestamp timestamp = 3;
  string version = 4;
  string build = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Duration uptime = 7;
  repeated HealthCheck checks = 8;
  repeated DependencyStatus dependencies = 9;
  HealthMetrics metrics = 10;
  repeated LogEntry logs = 11;
  map<string, string> metadata = 12;
  repeated HealthIssue issues = 13;
}

// HealthCheck представляет отдельную проверку здоровья
message HealthCheck {
  string name = 1;
  HealthCheckResponse.ServingStatus status = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
  google.protobuf.Duration duration = 5;
  map<string, string> details = 6;
  repeated HealthIssue issues = 7;
}

// DependencyStatus представляет статус зависимости
message DependencyStatus {
  string name = 1;
  string type = 2;
  string address = 3;
  HealthCheckResponse.ServingStatus status = 4;
  string message = 5;
  google.protobuf.Timestamp last_check = 6;
  google.protobuf.Duration response_time = 7;
  int32 consecutive_failures = 8;
  map<string, string> details = 9;
}

// HealthMetrics представляет метрики здоровья
message HealthMetrics {
  int32 active_connections = 1;
  int32 total_requests = 2;
  int32 failed_requests = 3;
  float success_rate = 4;
  google.protobuf.Duration avg_response_time = 5;
  google.protobuf.Duration max_response_time = 6;
  int64 memory_usage_bytes = 7;
  int64 memory_limit_bytes = 8;
  float cpu_usage_percent = 9;
  int64 disk_usage_bytes = 10;
  int64 disk_limit_bytes = 11;
  int32 goroutines = 12;
  int32 open_files = 13;
  google.protobuf.Timestamp last_gc = 14;
  int32 gc_count = 15;
}

// LogEntry представляет запись лога
message LogEntry {
  google.protobuf.Timestamp timestamp = 1;
  string level = 2;
  string message = 3;
  map<string, string> fields = 4;
  string logger = 5;
  string caller = 6;
}

// HealthIssue представляет проблему со здоровьем
message HealthIssue {
  string code = 1;
  string message = 2;
  HealthSeverity severity = 3;
  google.protobuf.Timestamp detected_at = 4;
  google.protobuf.Timestamp resolved_at = 5;
  bool resolved = 6;
  map<string, string> context = 7;
  repeated string suggestions = 8;
}

// ServiceHealthRequest запрос на проверку здоровья конкретного сервиса
message ServiceHealthRequest {
  string service_name = 1;
  bool include_dependencies = 2;
  bool include_metrics = 3;
}

// ServiceHealthResponse ответ о здоровье сервиса
message ServiceHealthResponse {
  string service_name = 1;
  HealthCheckResponse.ServingStatus status = 2;
  string version = 3;
  google.protobuf.Timestamp timestamp = 4;
  repeated HealthCheck checks = 5;
  repeated DependencyStatus dependencies = 6;
  HealthMetrics metrics = 7;
  repeated HealthIssue issues = 8;
}

// AllServicesHealthResponse ответ о здоровье всех сервисов
message AllServicesHealthResponse {
  google.protobuf.Timestamp timestamp = 1;
  repeated ServiceHealthResponse services = 2;
  HealthCheckResponse.ServingStatus overall_status = 3;
  int32 healthy_services = 4;
  int32 unhealthy_services = 5;
  int32 total_services = 6;
  repeated HealthIssue global_issues = 7;
}

// DependencyHealthRequest запрос на проверку здоровья зависимостей
message DependencyHealthRequest {
  repeated string dependency_names = 1;
  string dependency_type = 2;
  bool include_metrics = 3;
}

// DependencyHealthResponse ответ о здоровье зависимостей
message DependencyHealthResponse {
  google.protobuf.Timestamp timestamp = 1;
  repeated DependencyStatus dependencies = 2;
  HealthCheckResponse.ServingStatus overall_status = 3;
  int32 healthy_dependencies = 4;
  int32 unhealthy_dependencies = 5;
  int32 total_dependencies = 6;
}

// SystemHealthRequest запрос на проверку здоровья системы
message SystemHealthRequest {
  bool include_detailed_metrics = 1;
  bool include_resource_usage = 2;
  bool include_environment = 3;
}

// SystemHealthResponse ответ о здоровье системы
message SystemHealthResponse {
  google.protobuf.Timestamp timestamp = 1;
  HealthCheckResponse.ServingStatus status = 2;
  SystemInfo system_info = 3;
  ResourceUsage resource_usage = 4;
  EnvironmentInfo environment = 5;
  repeated HealthIssue issues = 6;
  map<string, string> metadata = 7;
}

// SystemInfo представляет информацию о системе
message SystemInfo {
  string hostname = 1;
  string os = 2;
  string arch = 3;
  string kernel_version = 4;
  int32 cpu_cores = 5;
  int64 total_memory = 6;
  int64 total_disk = 7;
  google.protobuf.Timestamp boot_time = 8;
  google.protobuf.Duration uptime = 9;
}

// ResourceUsage представляет использование ресурсов
message ResourceUsage {
  CPUUsage cpu = 1;
  MemoryUsage memory = 2;
  DiskUsage disk = 3;
  NetworkUsage network = 4;
  ProcessUsage process = 5;
}

// CPUUsage представляет использование CPU
message CPUUsage {
  float usage_percent = 1;
  float load_average_1m = 2;
  float load_average_5m = 3;
  float load_average_15m = 4;
  int32 running_processes = 5;
  int32 total_processes = 6;
}

// MemoryUsage представляет использование памяти
message MemoryUsage {
  int64 total_bytes = 1;
  int64 used_bytes = 2;
  int64 free_bytes = 3;
  int64 available_bytes = 4;
  int64 cached_bytes = 5;
  int64 buffers_bytes = 6;
  float usage_percent = 7;
  float swap_usage_percent = 8;
}

// DiskUsage представляет использование диска
message DiskUsage {
  int64 total_bytes = 1;
  int64 used_bytes = 2;
  int64 free_bytes = 3;
  float usage_percent = 4;
  int64 inodes_total = 5;
  int64 inodes_used = 6;
  int64 inodes_free = 7;
  float inodes_usage_percent = 8;
  string mount_point = 9;
  string filesystem = 10;
}

// NetworkUsage представляет использование сети
message NetworkUsage {
  int64 bytes_sent = 1;
  int64 bytes_received = 2;
  int64 packets_sent = 3;
  int64 packets_received = 4;
  int64 errors_in = 5;
  int64 errors_out = 6;
  int64 drops_in = 7;
  int64 drops_out = 8;
  int32 connections_active = 9;
  int32 connections_established = 10;
}

// ProcessUsage представляет использование ресурсов процессом
message ProcessUsage {
  int32 pid = 1;
  float cpu_percent = 2;
  int64 memory_rss_bytes = 3;
  int64 memory_vms_bytes = 4;
  int32 file_descriptors = 5;
  int32 threads = 6;
  google.protobuf.Duration start_time = 7;
  google.protobuf.Duration cpu_time = 8;
}

// EnvironmentInfo представляет информацию об окружении
message EnvironmentInfo {
  map<string, string> environment_variables = 1;
  repeated string arguments = 2;
  string working_directory = 3;
  string executable_path = 4;
  map<string, string> configuration = 5;
}

// LiveResponse ответ для liveness probe
message LiveResponse {
  bool alive = 1;
  google.protobuf.Timestamp timestamp = 2;
  string version = 3;
}

// ReadyResponse ответ для readiness probe
message ReadyResponse {
  bool ready = 1;
  google.protobuf.Timestamp timestamp = 2;
  string version = 3;
  repeated string not_ready_services = 4;
}

// StartupResponse ответ для startup probe
message StartupResponse {
  bool started = 1;
  google.protobuf.Timestamp timestamp = 2;
  string version = 3;
  google.protobuf.Duration startup_time = 4;
  string phase = 5;
  string message = 6;
}

// Enums для health checking

// HealthSeverity представляет серьезность проблемы
enum HealthSeverity {
  HEALTH_SEVERITY_UNSPECIFIED = 0;
  HEALTH_SEVERITY_INFO = 1;
  HEALTH_SEVERITY_WARNING = 2;
  HEALTH_SEVERITY_ERROR = 3;
  HEALTH_SEVERITY_CRITICAL = 4;
}

// DependencyType представляет тип зависимости
enum DependencyType {
  DEPENDENCY_TYPE_UNSPECIFIED = 0;
  DEPENDENCY_TYPE_DATABASE = 1;
  DEPENDENCY_TYPE_CACHE = 2;
  DEPENDENCY_TYPE_QUEUE = 3;
  DEPENDENCY_TYPE_STORAGE = 4;
  DEPENDENCY_TYPE_SERVICE = 5;
  DEPENDENCY_TYPE_API = 6;
  DEPENDENCY_TYPE_FILESYSTEM = 7;
  DEPENDENCY_TYPE_NETWORK = 8;
}
